name: ARC Runner Test
on:
  workflow_dispatch:

jobs:
  test-basic:
    runs-on: pact.arc.runners-nowakmax-tools
    steps:
      - run: echo "🎉 Running on ARC self-hosted runner"
      - run: |
          echo "RUNNER_VERSION=${RUNNER_VERSION:-not set}"
          if [ -x /runner/bin/Runner.Listener ]; then
            /runner/bin/Runner.Listener --version
          elif command -v Runner.Listener >/dev/null 2>&1; then
            Runner.Listener --version
          else
            echo "Runner.Listener binary not found"
          fi
      - run: cat /etc/os-release
      - run: uname -a
      - run: echo "Repo:${{ github.repository }}, Ref:${{ github.ref }}"
      - run: sleep 300

  test-networking:
    runs-on: pact.arc.runners-nowakmax-tools
    steps:
      - run: echo "🌐 Testing network connectivity"
      - run: curl -s -o /dev/null -w "%{http_code}" https://github.com
      - run: nslookup github.com || cat /etc/resolv.conf
      - run: echo "Repo:${{ github.repository }}, Ref:${{ github.ref }}"

  test-tooling:
    runs-on: pact.arc.runners-nowakmax-tools
    container:
      image: harbor.pact.intel.com/common/ansible-proxmox@sha256:93df269bc6d2ba50a4499bc3ff9bd4482eaf4cbad180de23d4f2531590e74c83
    defaults:
      run:
        shell: bash
    steps:
      - run: echo "🔧 Testing available tools"
      - run: git --version || echo "git not found"
      - run: which bash && bash --version
      - run: df -h
      - run: echo "Container image started successfully"
      - run: echo "Repo:${{ github.repository }}, Ref:${{ github.ref }}"
