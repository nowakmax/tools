name: ARC Runner Test
on:
  workflow_dispatch:

jobs:
  test-ubuntu:
    runs-on: pact.arc.runners-nowakmax-tools
    container:
      image: ubuntu:24.04
    steps:
      - run: echo "🎉 Running on ARC with Ubuntu 24.04"
      - run: cat /etc/os-release
      - run: uname -a
      - run: echo "Repo:${{ github.repository }}, Ref:${{ github.ref }}"

  test-alpine:
    runs-on: pact.arc.runners-nowakmax-tools
    container:
      image: alpine:3.20
    steps:
      - run: echo "🏔️ Running on ARC with Alpine 3.20"
      - run: cat /etc/os-release
      - run: apk add --no-cache curl && curl --version
      - run: echo "Repo:${{ github.repository }}, Ref:${{ github.ref }}"

  test-debian:
    runs-on: pact.arc.runners-nowakmax-tools
    container:
      image: debian:bookworm-slim
    steps:
      - run: echo "📦 Running on ARC with Debian Bookworm"
      - run: cat /etc/os-release
      - run: dpkg --print-architecture
      - run: echo "Repo:${{ github.repository }}, Ref:${{ github.ref }}"
